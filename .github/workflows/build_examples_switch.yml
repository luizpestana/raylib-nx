name: Build raylib examples - Switch

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'examples/**'
      - 'projects/switch-nx/**'
      - '.github/workflows/build_examples_switch.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'projects/switch-nx/**'
      - '.github/workflows/build_examples_switch.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends libglfw3 libglfw3-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxext-dev libxfixes-dev libwayland-dev libxkbcommon-dev
        
    - name: Build Library
      run: |
        cd src
        make PLATFORM=PLATFORM_NX
        cd ..
        
    - name: Build Examples
      run: |
        cd examples
        make PLATFORM=PLATFORM_NX
        cd ..

    - name: Build Switch NX Project
      run: |
        cd projects/switch-nx
        RAYLIB_NX="$GITHUB_WORKSPACE" make PLATFORM=PLATFORM_NX
        cd ../..

    - name: Upload Switch NX Project
      uses: actions/upload-artifact@v4
      with:
        name: switch-nx
        path: projects/switch-nx/switch-nx.nro
        if-no-files-found: error
